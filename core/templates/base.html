<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}CRM{% endblock %}</title>
    <style>
        body { font-family: Tahoma, sans-serif; margin: 0; background: #f5f6fa; }
        nav { background: #2c3e50; padding: 12px 20px; }
        nav a { color: #fff; text-decoration: none; margin-left: 16px; }
        .container { padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: right; }
        th { background: #ecf0f1; }
        .board { display: flex; gap: 12px; overflow-x: auto; }
        .stage-column { background: #fff; border-radius: 8px; padding: 10px; min-width: 220px; }
        .deal-card { background: #f9f9f9; border: 1px solid #ddd; border-radius: 6px; padding: 8px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'deal-list' %}">معاملات</a>
        <a href="{% url 'pipeline-board' %}">پایپ‌لاین</a>
        <a href="{% url 'contact-list' %}">مخاطبین</a>
        <a href="{% url 'lead-list' %}">سرنخ‌ها</a>
        <a href="{% url 'task-list' %}">تسک‌ها</a>
        <a href="{% url 'profile' %}">پروفایل</a>
        {% if user.is_authenticated %}
            <a href="{% url 'logout' %}">خروج ({{ user.username }})</a>
        {% else %}
            <a href="{% url 'login' %}">ورود</a>
        {% endif %}
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
